version: '3'

tasks:
  test:
    desc: Run all Go unit tests
    cmds:
      - go test ./...

  build:
    desc: Compile the asset-cat CLI binary
    cmds:
      - go build -o bin/asset-cat cmd/asset-cat/main.go

  run:
    desc: Run the terminal renderer
    deps: [build]
    cmds:
      - ./bin/asset-cat run --input {{.CLI_ARGS}}

  json:
    desc: Output extracted model as JSON
    deps: [build]
    cmds:
      - ./bin/asset-cat json --input {{.CLI_ARGS}}

  serve:
    desc: Start the web viewer server
    deps: [build]
    cmds:
      - ./bin/asset-cat serve --input {{.CLI_ARGS}}

  clean:
    desc: Remove generated binaries and build artifacts
    cmds:
      - rm -rf bin/

  context:
    desc: Collect all .go files into a single flattened context.txt
    cmds:
      - |
        echo "=== asset-cat Full Source Context ===" > context.txt
        echo "Generated: $(date)" >> context.txt
        echo "" >> context.txt
        find . -name "*.go" -not -path "./bin/*" | sort | while read -r file; do
          echo "================================================" >> context.txt
          echo "FILE: $file" >> context.txt
          echo "================================================" >> context.txt
          cat "$file" >> context.txt
          echo "" >> context.txt
        done
        echo "=== End of Context ===" >> context.txt
        echo "Context written to context.txt ($(wc -l < context.txt) lines)"